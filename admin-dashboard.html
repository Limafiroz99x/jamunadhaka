<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            padding: 50px;
            background: #f0f2f5;
        }
        .dashboard {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        button {
            background: #e74c3c;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }
        .success {
            background: #27ae60;
            padding: 10px;
            border-radius: 8px;
            color: white;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>✅ Welcome Admin!</h1>
        <div class="success">
            You have successfully logged in!
        </div>
        <p>This is your admin dashboard.</p>
        <p>Your full document management system will appear here.</p>
        <button onclick="logout()">Logout</button>
    </div>

    <script>
        function logout() {
            window.location.href = 'login-test.html';
        }
    </script>
</body>
</html>

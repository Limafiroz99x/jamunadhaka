<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jamuna LTD | Admin Panel - Database Version</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .login-box, .dashboard-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .login-box { max-width: 450px; margin: 100px auto; text-align: center; }
        .logo-icon {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, #1a4d8c, #0e3a6b);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
        }
        .logo-icon i { font-size: 35px; color: white; }
        h1 { color: #1a4d8c; margin-bottom: 20px; }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 1rem;
        }
        button {
            background: #1a4d8c;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
        }
        button:hover { background: #0e3a6b; }
        .btn-danger { background: #e74c3c; }
        .btn-sm { background: #7f8c8d; padding: 6px 12px; font-size: 0.85rem; }
        .upload-area {
            border: 2px dashed #1a4d8c;
            background: #f8f9fa;
            padding: 40px;
            text-align: center;
            border-radius: 15px;
            margin: 20px 0;
            cursor: pointer;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #1a4d8c, #0e3a6b);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }
        .stat-card i { font-size: 2rem; margin-bottom: 10px; }
        .stat-number { font-size: 2rem; font-weight: bold; }
        .doc-list { max-height: 500px; overflow-y: auto; }
        .doc-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #ecf0f1;
            flex-wrap: wrap;
            gap: 10px;
        }
        .doc-item:hover { background: #f8f9fa; }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 2000;
        }
        .hidden { display: none; }
        .error-msg { color: #e74c3c; margin-top: 15px; }
        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo { display: flex; align-items: center; gap: 15px; }
        .logo-icon-small {
            width: 50px; height: 50px;
            background: linear-gradient(135deg, #1a4d8c, #0e3a6b);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }
        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 15px; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- LOGIN SECTION -->
        <div id="loginSection" class="login-box">
            <div class="logo-icon"><i class="fas fa-shield-alt"></i></div>
            <h1>Admin Login</h1>
            <p>Enter your password to access the dashboard</p>
            <input type="password" id="passwordInput" placeholder="Enter Admin Password">
            <button id="loginButton">Login</button>
            <div id="errorMsg" class="error-msg"></div>
        </div>

        <!-- DASHBOARD SECTION -->
        <div id="dashboardSection" class="hidden">
            <div class="header">
                <div class="logo">
                    <div class="logo-icon-small"><i class="fas fa-shield-alt"></i></div>
                    <div>
                        <h1>Jamuna LTD</h1>
                        <p>Paitka, Dhanbari, Tangail</p>
                    </div>
                </div>
                <button id="logoutButton" class="btn-danger">Logout</button>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <i class="fas fa-file-alt"></i>
                    <div class="stat-number" id="totalDocs">0</div>
                    <div>Total Documents</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-eye"></i>
                    <div class="stat-number" id="totalVerifications">0</div>
                    <div>Verifications</div>
                </div>
            </div>

            <div class="dashboard-card">
                <h2><i class="fas fa-upload"></i> Upload Document</h2>
                <input type="text" id="docTitle" placeholder="Document Title *">
                <input type="date" id="issueDate">
                <select id="docCategory">
                    <option>Invoice</option><option>Certificate</option><option>Report</option><option>Legal</option><option>Other</option>
                </select>
                <textarea id="docDesc" rows="3" placeholder="Additional notes (optional)"></textarea>
                <div class="upload-area" id="uploadArea">
                    <i class="fas fa-cloud-upload-alt" style="font-size: 2rem; color: #1a4d8c;"></i>
                    <p>Click to upload document (PDF, JPG, PNG)</p>
                </div>
                <input type="file" id="docFile" accept=".pdf,.jpg,.jpeg,.png" style="display: none;">
                <button id="uploadBtn" style="width: 100%;"><i class="fas fa-qrcode"></i> Upload & Generate QR</button>
            </div>

            <div class="dashboard-card" style="margin-top: 20px;">
                <h2><i class="fas fa-list"></i> Document Manager</h2>
                <div id="documentsList" class="doc-list">
                    <p>Loading documents...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // SUPABASE CONFIGURATION - FIXED (no duplicate)
        // ============================================
        const SB_URL = 'https://bxvpqjyxffwurosscbsw.supabase.co';
        const SB_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4dnBxanl4ZmZ3dXJvc3NjYnN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MDY3OTYsImV4cCI6MjA5NTE4Mjc5Nn0.riUBTCg2s_dL1ugshVRHwraFFzGjpJ9xBczAefcp9u8';
        
        const sbClient = supabaseJs.createClient(SB_URL, SB_ANON_KEY);
        
        // ============================================
        // LOGIN FUNCTIONS
        // ============================================
        function doLogin() {
            const password = document.getElementById('passwordInput').value;
            if (password === 'Jamuna2025') {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashboardSection').classList.remove('hidden');
                document.getElementById('errorMsg').innerHTML = '';
                loadDocuments();
                updateStats();
                setupUpload();
            } else {
                document.getElementById('errorMsg').innerHTML = '❌ Incorrect password. Try: Jamuna2025';
            }
        }
        
        function doLogout() {
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('dashboardSection').classList.add('hidden');
            document.getElementById('passwordInput').value = '';
        }
        
        document.getElementById('loginButton').onclick = doLogin;
        document.getElementById('logoutButton').onclick = doLogout;
        document.getElementById('passwordInput').onkeypress = (e) => { if (e.key === 'Enter') doLogin(); };
        
        // ============================================
        // DATABASE FUNCTIONS
        // ============================================
        async function loadDocuments() {
            const { data, error } = await sbClient
                .from('documents')
                .select('*')
                .order('uploaded_at', { ascending: false });
            
            const container = document.getElementById('documentsList');
            
            if (error) {
                container.innerHTML = '<p>Error loading documents: ' + error.message + '</p>';
                return;
            }
            
            if (!data || data.length === 0) {
                container.innerHTML = '<p>No documents yet. Upload your first document above.</p>';
                return;
            }
            
            container.innerHTML = data.map(doc => `
                <div class="doc-item">
                    <div style="flex: 1;">
                        <strong><i class="fas fa-file-pdf"></i> ${escapeHtml(doc.title)}</strong><br>
                        <small>ID: ${escapeHtml(doc.doc_id)} | Issued: ${escapeHtml(doc.issue_date)} | Verified: ${doc.verification_count || 0} times</small>
                    </div>
                    <div class="doc-actions">
                        <button onclick="copyLink('${doc.doc_id}')" class="btn-sm"><i class="fas fa-copy"></i> Copy Link</button>
                        <button onclick="deleteDocument('${doc.doc_id}')" class="btn-danger"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                </div>
            `).join('');
        }
        
        async function updateStats() {
            const { data: docs } = await sbClient.from('documents').select('*');
            document.getElementById('totalDocs').innerText = docs ? docs.length : 0;
            
            const { data: verifications } = await sbClient.from('verifications').select('*');
            document.getElementById('totalVerifications').innerText = verifications ? verifications.length : 0;
        }
        
        window.copyLink = function(id) {
            const link = `https://limafiroz99x.github.io/jamunadhaka/index-db.html?doc=${id}`;
            navigator.clipboard.writeText(link);
            showToast('Verification link copied!');
        };
        
        window.deleteDocument = async function(id) {
            if (confirm('⚠️ Delete this document permanently?')) {
                await sbClient.from('documents').delete().eq('doc_id', id);
                showToast('Document deleted');
                loadDocuments();
                updateStats();
            }
        };
        
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = '<i class="fas fa-check-circle"></i> ' + message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function generateDocId() {
            return 'JAM-' + Date.now() + '-' + Math.floor(Math.random() * 10000);
        }
        
        function setupUpload() {
            document.getElementById('uploadArea').onclick = () => document.getElementById('docFile').click();
            document.getElementById('uploadBtn').onclick = () => {
                const title = document.getElementById('docTitle').value;
                const issueDate = document.getElementById('issueDate').value;
                const category = document.getElementById('docCategory').value;
                const description = document.getElementById('docDesc').value;
                const file = document.getElementById('docFile').files[0];
                
                if (!title || !issueDate || !file) {
                    alert('Please fill all fields');
                    return;
                }
                
                showToast('Uploading to database...');
                
                const reader = new FileReader();
                reader.onload = async function(e) {
                    const docId = generateDocId();
                    
                    const { error } = await sbClient.from('documents').insert({
                        doc_id: docId,
                        title: title,
                        issue_date: issueDate,
                        category: category,
                        description: description,
                        file_data: e.target.result
                    });
                    
                    if (error) {
                        showToast('Upload failed: ' + error.message);
                        console.error('Supabase error:', error);
                        return;
                    }
                    
                    // Generate QR Code Document
                    const tempDiv = document.createElement('div');
                    const verifyUrl = `https://limafiroz99x.github.io/jamunadhaka/index-db.html?doc=${docId}`;
                    new QRCode(tempDiv, { text: verifyUrl, width: 150, height: 150 });
                    
                    setTimeout(() => {
                        const qrImg = tempDiv.querySelector('img');
                        const qrHtml = `<!DOCTYPE html>
                        <html>
                        <head>
                            <meta charset="UTF-8">
                            <title>${title} - Jamuna LTD</title>
                            <style>
                                body { font-family: Arial; text-align: center; padding: 50px; }
                                .header { border-bottom: 3px solid #1a4d8c; margin-bottom: 30px; }
                                .qr-code { margin: 30px auto; }
                            </style>
                        </head>
                        <body>
                            <div class="header">
                                <h1>Jamuna LTD</h1>
                                <p>Paitka, Dhanbari, Tangail</p>
                                <h2>✅ OFFICIALLY VERIFIED DOCUMENT</h2>
                            </div>
                            <h2>${escapeHtml(title)}</h2>
                            <p><strong>Document ID:</strong> ${docId}</p>
                            <p><strong>Issue Date:</strong> ${issueDate}</p>
                            <p><strong>Category:</strong> ${category}</p>
                            ${description ? `<p><strong>Notes:</strong> ${escapeHtml(description)}</p>` : ''}
                            <div class="qr-code">
                                ${qrImg ? `<img src="${qrImg.src}" alt="QR Code">` : '<p>QR Code</p>'}
                            </div>
                            <p><strong>Scan QR code or visit:</strong><br>${verifyUrl}</p>
                            <hr>
                            <small>This document can be verified at Jamuna LTD official portal</small>
                        </body>
                        </html>`;
                        
                        const blob = new Blob([qrHtml], { type: 'text/html' });
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        a.download = `${title.replace(/[^a-z0-9]/gi, '_')}_JAMUNA_VERIFIED.html`;
                        a.click();
                        URL.revokeObjectURL(blob);
                        
                        showToast(`✅ Uploaded! ID: ${docId}`);
                        document.getElementById('docTitle').value = '';
                        document.getElementById('issueDate').value = '';
                        document.getElementById('docDesc').value = '';
                        document.getElementById('docFile').value = '';
                        
                        loadDocuments();
                        updateStats();
                    }, 200);
                };
                reader.readAsDataURL(file);
            };
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                return m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;');
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jamuna LTD | Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .login-card, .dashboard-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .login-card { max-width: 450px; margin: 100px auto; text-align: center; }
        h1 { color: #1a4d8c; margin-bottom: 20px; }
        .logo-icon {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, #1a4d8c, #0e3a6b);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
        }
        .logo-icon i { font-size: 35px; color: white; }
        input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #ecf0f1;
            border-radius: 12px;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #1a4d8c;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #0e3a6b; }
        .error-msg { color: #e74c3c; margin-top: 15px; }
        .hidden { display: none; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #1a4d8c, #0e3a6b);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }
        .stat-number { font-size: 2rem; font-weight: bold; }
        .stat-card i { font-size: 2rem; margin-bottom: 10px; }
        .upload-area {
            border: 2px dashed #1a4d8c;
            background: #f8f9fa;
            padding: 30px;
            text-align: center;
            border-radius: 15px;
            margin: 20px 0;
            cursor: pointer;
        }
        .doc-list { max-height: 500px; overflow-y: auto; }
        .doc-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #ecf0f1;
            flex-wrap: wrap;
            gap: 10px;
        }
        .doc-actions button {
            width: auto;
            margin: 5px;
            padding: 8px 15px;
        }
        .btn-danger { background: #e74c3c; }
        .btn-sm { background: #7f8c8d; }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 2000;
        }
        h2 { color: #1a4d8c; margin: 20px 0 15px 0; }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginSection" class="login-card">
            <div class="logo-icon"><i class="fas fa-shield-alt"></i></div>
            <h1>Admin Login</h1>
            <p style="color: #7f8c8d;">Enter password to access dashboard</p>
            <input type="password" id="passwordInput" placeholder="Enter Admin Password">
            <button id="loginButton">Login</button>
            <div id="errorMsg" class="error-msg"></div>
        </div>

        <div id="dashboardSection" class="dashboard-card hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                <h1><i class="fas fa-chart-line"></i> Admin Dashboard</h1>
                <button id="logoutButton" class="btn-danger" style="width: auto; padding: 10px 20px;">Logout</button>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <i class="fas fa-file-alt"></i>
                    <div class="stat-number" id="totalDocs">0</div>
                    <div>Total Documents</div>
                </div>
            </div>

            <h2><i class="fas fa-upload"></i> Upload Document</h2>
            <input type="text" id="docTitle" placeholder="Document Title *">
            <input type="date" id="issueDate">
            <select id="docCategory">
                <option>Invoice</option><option>Certificate</option><option>Report</option><option>Legal</option>
            </select>
            <textarea id="docDesc" rows="3" placeholder="Additional notes"></textarea>
            <div class="upload-area" id="uploadArea">
                <i class="fas fa-cloud-upload-alt" style="font-size: 2rem; color: #1a4d8c;"></i>
                <p>Click to upload document (PDF, JPG, PNG)</p>
            </div>
            <input type="file" id="docFile" accept=".pdf,.jpg,.jpeg,.png" style="display: none;">
            <button id="uploadBtn">Upload & Generate QR</button>

            <h2>Document Manager</h2>
            <div id="documentsList" class="doc-list">
                <p>Loading...</p>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://bxvpqjyxffwurosscbsw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4dnBxanl4ZmZ3dXJvc3NjYnN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MDY3OTYsImV4cCI6MjA5NTE4Mjc5Nn0.riUBTCg2s_dL1ugshVRHwraFFzGjpJ9xBczAefcp9u8';
        const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const loginSection = document.getElementById('loginSection');
        const dashboardSection = document.getElementById('dashboardSection');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginButton');
        const errorMsg = document.getElementById('errorMsg');
        const logoutBtn = document.getElementById('logoutButton');
        
        function doLogin() {
            const password = passwordInput.value;
            if (password === 'Jamuna2025') {
                loginSection.classList.add('hidden');
                dashboardSection.classList.remove('hidden');
                errorMsg.innerHTML = '';
                loadDocuments();
                updateStats();
                setupUpload();
            } else {
                errorMsg.innerHTML = '❌ Incorrect password. Try: Jamuna2025';
            }
        }
        
        function doLogout() {
            loginSection.classList.remove('hidden');
            dashboardSection.classList.add('hidden');
            passwordInput.value = '';
            errorMsg.innerHTML = '';
        }
        
        loginBtn.onclick = doLogin;
        logoutBtn.onclick = doLogout;
        passwordInput.onkeypress = (e) => { if (e.key === 'Enter') doLogin(); };
        
        async function loadDocuments() {
            const { data } = await supabase.from('documents').select('*').order('uploaded_at', { ascending: false });
            const container = document.getElementById('documentsList');
            if (!data || data.length === 0) {
                container.innerHTML = '<p>No documents yet.</p>';
                return;
            }
            container.innerHTML = data.map(doc => `
                <div class="doc-item">
                    <div><strong>${escapeHtml(doc.title)}</strong><br><small>ID: ${doc.doc_id} | ${doc.issue_date} | Verified: ${doc.verification_count || 0} times</small></div>
                    <div class="doc-actions">
                        <button onclick="copyLink('${doc.doc_id}')" class="btn-sm">Copy Link</button>
                        <button onclick="deleteDoc('${doc.doc_id}')" class="btn-danger">Delete</button>
                    </div>
                </div>
            `).join('');
        }
        
        async function updateStats() {
            const { data } = await supabase.from('documents').select('*');
            document.getElementById('totalDocs').innerText = data ? data.length : 0;
        }
        
        window.copyLink = function(id) {
            const link = `https://limafiroz99x.github.io/jamunadhaka/index.html?doc=${id}`;
            navigator.clipboard.writeText(link);
            showToast('Link copied!');
        };
        
        window.deleteDoc = async function(id) {
            if (confirm('Delete this document?')) {
                await supabase.from('documents').delete().eq('doc_id', id);
                loadDocuments();
                updateStats();
                showToast('Deleted');
            }
        };
        
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function generateDocId() {
            return 'JAM-' + Date.now() + '-' + Math.floor(Math.random() * 10000);
        }
        
        function setupUpload() {
            document.getElementById('uploadArea').onclick = () => document.getElementById('docFile').click();
            document.getElementById('uploadBtn').onclick = () => {
                const title = document.getElementById('docTitle').value;
                const issueDate = document.getElementById('issueDate').value;
                const category = document.getElementById('docCategory').value;
                const description = document.getElementById('docDesc').value;
                const file = document.getElementById('docFile').files[0];
                
                if (!title || !issueDate || !file) {
                    alert('Please fill all fields');
                    return;
                }
                
                showToast('Uploading...');
                
                const reader = new FileReader();
                reader.onload = async function(e) {
                    const docId = generateDocId();
                    
                    const { error } = await supabase.from('documents').insert([{
                        doc_id: docId, title, issue_date: issueDate,
                        category, description, file_data: e.target.result
                    }]);
                    
                    if (error) { showToast('Upload failed'); return; }
                    
                    const tempDiv = document.createElement('div');
                    const verifyUrl = `https://limafiroz99x.github.io/jamunadhaka/index.html?doc=${docId}`;
                    new QRCode(tempDiv, { text: verifyUrl, width: 150, height: 150 });
                    
                    setTimeout(() => {
                        const qrImg = tempDiv.querySelector('img');
                        const html = `<!DOCTYPE html><html><head><title>${title}</title><style>body{text-align:center;padding:40px;font-family:Arial}</style></head><body><h1>Jamuna LTD</h1><p>Paitka, Dhanbari, Tangail</p><h2>${title}</h2><p><strong>ID:</strong> ${docId}</p><p><strong>Date:</strong> ${issueDate}</p>${qrImg ? `<img src="${qrImg.src}">` : ''}<p><strong>Verify:</strong><br>${verifyUrl}</p></body></html>`;
                        const blob = new Blob([html], {type: 'text/html'});
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        a.download = `${title.replace(/[^a-z0-9]/gi, '_')}_JAMUNA_VERIFIED.html`;
                        a.click();
                        showToast(`Uploaded! ID: ${docId}`);
                        document.getElementById('docTitle').value = '';
                        document.getElementById('issueDate').value = '';
                        document.getElementById('docDesc').value = '';
                        document.getElementById('docFile').value = '';
                        loadDocuments();
                        updateStats();
                    }, 100);
                };
                reader.readAsDataURL(file);
            };
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jamuna LTD | Official Document Verification</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            min-height: 100vh;
        }
        .navbar {
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 15px 5%;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo { display: flex; align-items: center; gap: 15px; }
        .logo-icon {
            width: 55px; height: 55px;
            background: linear-gradient(135deg, #1a4d8c, #0e3a6b);
            border-radius: 15px;
            display: flex;
            align-items: center; justify-content: center;
            color: white; font-size: 28px;
        }
        .logo-text h1 { font-size: 1.6rem; color: #1a4d8c; }
        .logo-text p { font-size: 0.8rem; color: #7f8c8d; }
        .trust-badge {
            background: #27ae60; color: white;
            padding: 8px 20px; border-radius: 30px;
            font-size: 0.9rem;
        }
        .main-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .card {
            background: white; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 40px;
        }
        .verify-header { text-align: center; margin-bottom: 30px; }
        .verify-header h2 { color: #1a4d8c; font-size: 1.8rem; }
        input {
            width: 100%; padding: 15px;
            border: 2px solid #ecf0f1; border-radius: 12px;
            font-size: 1rem; margin: 10px 0;
        }
        button {
            width: 100%; padding: 15px;
            background: #1a4d8c; color: white;
            border: none; border-radius: 12px;
            font-size: 1rem; font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #0e3a6b; }
        .document-viewer {
            background: white; border-radius: 20px;
            padding: 30px; margin-top: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .verified-badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: linear-gradient(135deg, #27ae60, #219a52);
            color: white; padding: 8px 20px; border-radius: 50px;
            margin-bottom: 20px;
        }
        .doc-title { font-size: 1.8rem; color: #1a4d8c; margin: 20px 0; }
        .doc-details {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px; margin: 20px 0; padding: 20px;
            background: #f8f9fa; border-radius: 12px;
        }
        .detail-item { display: flex; align-items: center; gap: 10px; }
        .detail-item i { width: 30px; color: #1a4d8c; }
        .document-preview {
            margin: 25px 0; background: #f8f9fa;
            border-radius: 12px; overflow: hidden;
        }
        .preview-header {
            background: #2c3e50; color: white;
            padding: 12px 20px; font-weight: bold;
        }
        .preview-content { padding: 20px; max-height: 600px; overflow: auto; }
        .preview-content img { max-width: 100%; border-radius: 8px; }
        .preview-content iframe { width: 100%; height: 550px; border: none; }
        .footer {
            text-align: center; padding: 30px;
            background: #1a4d8c; color: white;
            margin-top: 40px;
        }
        .loading { text-align: center; padding: 40px; }
        @media (max-width: 768px) {
            .nav-container { flex-direction: column; text-align: center; gap: 15px; }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="nav-container">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-file-certificate"></i></div>
                <div class="logo-text">
                    <h1>Jamuna LTD</h1>
                    <p>Paitka, Dhanbari, Tangail</p>
                </div>
            </div>
            <div class="trust-badge"><i class="fas fa-shield-alt"></i> Official Verification Portal</div>
        </div>
    </div>

    <div class="main-container">
        <div class="card">
            <div class="verify-header">
                <i class="fas fa-qrcode" style="font-size: 50px; color: #1a4d8c;"></i>
                <h2>Document Verification Portal</h2>
                <p>Scan QR code or enter Document ID to verify authenticity</p>
            </div>
            <input type="text" id="docIdInput" placeholder="Enter Document ID (e.g., JAM-001)">
            <button id="verifyBtn"><i class="fas fa-check-circle"></i> Verify Document</button>
            <div id="result"></div>
        </div>
    </div>

    <div class="footer">
        <p>© 2025 Jamuna LTD - All documents are digitally verifiable</p>
        <p>Paitka, Dhanbari, Tangail | Official Government Approved</p>
    </div>

    <script>
        const SB_URL = 'https://bxvpqjyxffwurosscbsw.supabase.co';
        const SB_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4dnBxanl4ZmZ3dXJvc3NjYnN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MDY3OTYsImV4cCI6MjA5NTE4Mjc5Nn0.riUBTCg2s_dL1ugshVRHwraFFzGjpJ9xBczAefcp9u8';
        
        const sbClient = supabaseJs.createClient(SB_URL, SB_ANON_KEY);
        
        function getFilePreview(fileData) {
            if (!fileData) return '<div class="loading">Loading...</div>';
            if (fileData.startsWith('data:image')) {
                return `<img src="${fileData}" alt="Document">`;
            } else if (fileData.startsWith('data:application/pdf')) {
                return `<iframe src="${fileData}"></iframe>`;
            }
            return `<a href="${fileData}" download>Download to view</a>`;
        }
        
        async function verifyDocument(docId) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i> Verifying...</div>';
            
            const { data, error } = await sbClient
                .from('documents')
                .select('*')
                .eq('doc_id', docId)
                .single();
            
            if (error || !data) {
                resultDiv.innerHTML = '<div style="background:#fee;color:#e74c3c;padding:20px;border-radius:12px;">❌ Invalid Document ID</div>';
                return;
            }
            
            await sbClient
                .from('documents')
                .update({ verification_count: (data.verification_count || 0) + 1 })
                .eq('doc_id', docId);
            
            await sbClient
                .from('verifications')
                .insert([{ doc_id: docId, ip_address: 'web' }]);
            
            resultDiv.innerHTML = `
                <div class="document-viewer">
                    <div class="verified-badge"><i class="fas fa-check-circle"></i> OFFICIALLY VERIFIED</div>
                    <h2 class="doc-title">${escapeHtml(data.title)}</h2>
                    <div class="doc-details">
                        <div class="detail-item"><i class="fas fa-qrcode"></i> <strong>ID:</strong> ${escapeHtml(data.doc_id)}</div>
                        <div class="detail-item"><i class="fas fa-calendar"></i> <strong>Issue Date:</strong> ${escapeHtml(data.issue_date)}</div>
                        <div class="detail-item"><i class="fas fa-building"></i> <strong>Issued By:</strong> Jamuna LTD</div>
                        <div class="detail-item"><i class="fas fa-clock"></i> <strong>Verified:</strong> ${new Date().toLocaleString()}</div>
                    </div>
                    ${data.description ? `<div style="background:#f0f7ff;padding:15px;border-radius:12px;margin:15px 0;">${escapeHtml(data.description)}</div>` : ''}
                    <div class="document-preview">
                        <div class="preview-header">Document Preview</div>
                        <div class="preview-content">${getFilePreview(data.file_data)}</div>
                    </div>
                    <div style="display:flex;gap:15px;justify-content:center;margin-top:20px;">
                        <a href="${data.file_data}" download style="padding:12px 24px;background:#27ae60;color:white;text-decoration:none;border-radius:8px;"><i class="fas fa-download"></i> Download</a>
                        <button onclick="window.print()" style="padding:12px 24px;background:#7f8c8d;color:white;border:none;border-radius:8px;">Print</button>
                    </div>
                </div>
            `;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                return m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;');
            });
        }
        
        document.getElementById('verifyBtn').onclick = () => {
            const docId = document.getElementById('docIdInput').value.trim();
            if (docId) verifyDocument(docId);
            else alert('Enter Document ID');
        };
        
        const urlParams = new URLSearchParams(window.location.search);
        const docIdFromQR = urlParams.get('doc');
        if (docIdFromQR) {
            document.getElementById('docIdInput').value = docIdFromQR;
            verifyDocument(docIdFromQR);
        }
    </script>
</body>
</html>
